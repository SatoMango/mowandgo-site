<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mow&Go Lawn Care | Grand Junction, CO</title>

<style>
body { margin:0; font-family:Arial; background:#f5f5f5; }

/* HERO */
.hero {
  background:#2ecc71;
  color:white;
  text-align:center;
  padding:60px 20px;
}

/* SECTION */
.section {
  max-width:1000px;
  margin:30px auto;
  padding:20px;
  background:white;
  border-radius:10px;
}

/* BEFORE AFTER */
.before-after {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
  margin-top:20px;
}

.before-after img {
  width:100%;
  height:230px;
  object-fit:cover;
  border-radius:10px;
  cursor:pointer;
  transition:0.3s;
}

.before-after img:hover {
  transform:scale(1.03);
}

/* ZOOM MODAL */
#zoomModal {
  display:none;
  position:fixed;
  z-index:9999;
  left:0;
  top:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.9);
  justify-content:center;
  align-items:center;
}

#zoomModal img {
  max-width:90%;
  max-height:90%;
  border-radius:10px;
}

/* BUTTONS */
.call-btn, .text-btn {
  position:fixed;
  bottom:20px;
  padding:14px 18px;
  border-radius:50px;
  color:white;
  font-weight:bold;
  text-decoration:none;
}

.call-btn { right:20px; background:#2ecc71; }
.text-btn { right:140px; background:#3498db; }

footer {
  background:#222;
  color:white;
  text-align:center;
  padding:20px;
}
</style>

</head>

<body>

<div class="hero">
  <h1>Mow&Go Lawn Care</h1>
  <p>Grand Junction, CO</p>
</div>

<section class="section">
  <h2>Before & After Results</h2>

  <!-- JOB 1 -->

  <div class="before-after">
    <img src="images/before.jpg">
    <img src="images/after1.jpg">
  </div>

  <!-- JOB 2 -->

  <div class="before-after">
    <img src="images/yard2-before.jpg">
    <img src="images/yard2-after.jpg">
  </div>

  <!-- JOB 3 -->

  <div class="before-after">
    <img src="images/yard3-before.jpg">
    <img src="images/yard3-after.jpg">
  </div>

</section>

<footer>
  📞 (970) 261-6406
</footer>

<a href="tel:19702616406" class="call-btn">📞 Call</a> <a href="sms:19702616406" class="text-btn">💬 Text</a>

<!-- ZOOM MODAL -->

<div id="zoomModal">
  <img id="zoomImg">
</div>

<script>
// ZOOM FUNCTION
const modal = document.getElementById("zoomModal");
const modalImg = document.getElementById("zoomImg");

document.querySelectorAll("img").forEach(img => {
  img.addEventListener("click", function() {
    modal.style.display = "flex";
    modalImg.src = this.src;
  });
});

// CLOSE ON CLICK
modal.addEventListener("click", function() {
  modal.style.display = "none";
});
</script>

</body>
</html>
