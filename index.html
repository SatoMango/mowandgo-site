<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mow&Go Lawn Care | Grand Junction</title>

<style>
body { font-family: Arial; margin:0; background:#f5f5f5; }
.section { max-width:1000px; margin:30px auto; padding:20px; background:white; border-radius:10px; }
.hero { background:#2ecc71; color:white; text-align:center; padding:60px 20px; }
.before-after { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
img { width:100%; border-radius:10px; cursor:pointer; }
</style>

</head>

<body>

<div class="hero">
  <h1>Mow&Go Lawn Care</h1>
  <p>Grand Junction, CO</p>
</div>

<section class="section">
  <h2>Before & After</h2>

  <div class="before-after">
    <img src="images/before.jpg">
    <img src="images/after1.jpg">
  </div>

</section>

<section class="section">
  <h2>Estimate</h2>

  <select id="yard">
    <option value="50">Small ($50)</option>
    <option value="70">Medium ($70)</option>
    <option value="90">Large ($90)</option>
  </select>

<button onclick="calc()">Calculate</button>

  <p id="result"></p>
</section>

<script>
function calc(){
  let y = document.getElementById("yard").value;
  document.getElementById("result").innerText = "$" + y;
}
</script>

</body>
</html>
